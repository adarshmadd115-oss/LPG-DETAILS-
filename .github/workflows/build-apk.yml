name: Build LPG Manager APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Manual trigger button bhi milega

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # Step 1: Code checkout
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Java 17 setup
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Step 3: Android SDK setup
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Step 4: Required SDK platforms install
    - name: Install Android Platforms
      run: |
        yes | sdkmanager --licenses > /dev/null 2>&1
        sdkmanager "platforms;android-36" "build-tools;35.0.0" "platform-tools"

    # Step 5: Gemini API Key .env file banana
    - name: Create .env file
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    # Step 6: Debug keystore banana (signing ke liye)
    - name: Create Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore \
          -storepass android \
          -alias androiddebugkey \
          -keypass android \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US"

    # Step 7: Gradle setup (gradlew nahi hai project mein, isliye direct install)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.12'

    # Step 8: APK build
    - name: Build Debug APK
      run: gradle assembleDebug
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    # Step 9: APK upload as artifact (download kar sakte ho)
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LPG-Manager-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
