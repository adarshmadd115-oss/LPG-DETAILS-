name: Build LPG Manager APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Packages
      run: |
        yes | sdkmanager --licenses > /dev/null 2>&1
        sdkmanager "platforms;android-36" "build-tools;35.0.0" "platform-tools"
        sdkmanager "platforms;android-36-ext1" 2>/dev/null || echo "ext1 not available, continuing..."

    - name: Patch compileSdk syntax
      run: |
        sed -i 's/compileSdk { version = release(36) { minorApiLevel = 1 } }/compileSdk = 36/' app/build.gradle.kts
        grep "compileSdk" app/build.gradle.kts

    - name: Create .env file
      run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    - name: Create Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore \
          -storepass android -alias androiddebugkey \
          -keypass android -keyalg RSA -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon --stacktrace
      env:
        JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LPG-Manager-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30